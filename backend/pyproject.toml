[project]
name = "creator-intelligence-backend"
version = "0.1.0"
description = "Creator Intelligence Platform — FastAPI backend"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "gunicorn>=23.0",
    "pydantic>=2.9",
    "pydantic-settings>=2.6",
    "sqlalchemy[asyncio]>=2.0",
    "asyncpg>=0.30",
    "alembic>=1.14",
    "python-jose[cryptography]>=3.3",
    "redis>=5.2",
    "celery[redis]>=5.4",
    "flower>=2.0",
    "httpx>=0.27",
    "structlog>=24.4",
    "sentry-sdk[fastapi]>=2.17",
    "agno>=0.3",
    "openai>=1.54",
    "pytrends>=4.9",
    "praw>=7.8",
    "jinja2>=3.1",
    "python-multipart>=0.0.12",
    "tenacity>=9.0",
    "orjson>=3.10",
    "pgvector>=0.3",
    "youtube-transcript-api>=0.6",
    "yt-dlp>=2024.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=6.0",
    "ruff>=0.7",
    "mypy>=1.13",
]

[tool.ruff]
line-length = 100
target-version = "py312"
# Alembic-generated migrations aren't hand-authored — linting them just adds
# noise (long autogenerated column lists) without value, and would otherwise
# fail CI on files nobody edits by hand.
extend-exclude = ["migrations/versions"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Body", "fastapi.Path"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
include = ["app*"]
